<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LennyHub Knowledge Graph Viewer</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a1a;
            color: #fff;
        }

        #header {
            background: #2a2a2a;
            padding: 20px;
            border-bottom: 1px solid #444;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        #stats {
            font-size: 12px;
            color: #aaa;
        }

        #svg-container {
            width: 100%;
            height: calc(100vh - 100px);
            position: relative;
            overflow: hidden;
        }

        svg {
            display: block;
            width: 100%;
            height: 100%;
        }

        .node {
            stroke: #fff;
            stroke-width: 1.5px;
            cursor: pointer;
        }

        .node:hover {
            stroke-width: 3px;
        }

        .link {
            stroke: #666;
            stroke-width: 1px;
            opacity: 0.6;
        }

        text {
            font-size: 11px;
            pointer-events: none;
        }

        .node-label {
            text-anchor: middle;
            dominant-baseline: central;
            fill: #fff;
            font-weight: 500;
        }

        .tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 10px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            z-index: 1000;
            max-width: 300px;
            border: 1px solid #666;
        }

        .type-person { fill: #4CAF50; }
        .type-concept { fill: #2196F3; }
        .type-framework { fill: #FF9800; }
        .type-organization { fill: #9C27B0; }
        .type-unknown { fill: #666; }

        #legend {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.9);
            padding: 15px;
            border-radius: 4px;
            border: 1px solid #666;
            font-size: 12px;
        }

        .legend-item {
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }

        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.9);
            padding: 15px;
            border-radius: 4px;
            border: 1px solid #666;
            font-size: 12px;
            color: #aaa;
            max-width: 300px;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>LennyHub Knowledge Graph</h1>
        <div id="stats">Entities and relationships extracted from Lenny's Podcast transcripts</div>
    </div>

    <div id="svg-container">
        <div id="info">
            <div><strong>Hover</strong> over nodes to see details</div>
            <div><strong>Drag</strong> to move nodes</div>
            <div><strong>Scroll</strong> to zoom</div>
        </div>
        <svg id="graph"></svg>
        <div id="legend">
            <div class="legend-item">
                <div class="legend-color type-person"></div>
                <span>Person</span>
            </div>
            <div class="legend-item">
                <div class="legend-color type-concept"></div>
                <span>Concept</span>
            </div>
            <div class="legend-item">
                <div class="legend-color type-framework"></div>
                <span>Framework</span>
            </div>
            <div class="legend-item">
                <div class="legend-color type-organization"></div>
                <span>Organization</span>
            </div>
        </div>
    </div>

    <script>
        // Load and render graph
        d3.json("graph_data.json").then(data => {
            renderGraph(data);
            updateStats(data);
        }).catch(error => {
            console.error("Error loading graph data:", error);
            document.getElementById("stats").innerHTML = "Error loading graph data. Run 'python export_graph.py' first.";
        });

        function updateStats(data) {
            const stats = document.getElementById("stats");
            const nodeCount = data.nodes.length;
            const linkCount = data.links.length;
            stats.innerHTML = `${nodeCount} entities, ${linkCount} relationships`;
        }

        function renderGraph(data) {
            const container = document.getElementById("svg-container");
            const width = container.clientWidth;
            const height = container.clientHeight;

            const svg = d3.select("svg#graph")
                .attr("width", width)
                .attr("height", height);

            // Clear previous content
            svg.selectAll("*").remove();

            // Create arrow marker
            svg.append("defs").append("marker")
                .attr("id", "arrowhead")
                .attr("markerWidth", 10)
                .attr("markerHeight", 10)
                .attr("refX", 9)
                .attr("refY", 3)
                .attr("orient", "auto")
                .append("polygon")
                .attr("points", "0 0, 10 3, 0 6")
                .attr("fill", "#999");

            // Create force simulation
            const simulation = d3.forceSimulation(data.nodes)
                .force("link", d3.forceLink(data.links)
                    .id(d => d.id)
                    .distance(100))
                .force("charge", d3.forceManyBody().strength(-300))
                .force("center", d3.forceCenter(width / 2, height / 2))
                .force("collision", d3.forceCollide().radius(20));

            // Add zoom behavior
            const zoom = d3.zoom()
                .on("zoom", (event) => {
                    g.attr("transform", event.transform);
                });

            svg.call(zoom);

            // Create main group
            const g = svg.append("g");

            // Draw links
            const link = g.selectAll("line")
                .data(data.links)
                .enter()
                .append("line")
                .attr("class", "link")
                .attr("marker-end", "url(#arrowhead)");

            // Draw nodes
            const node = g.selectAll(".node")
                .data(data.nodes)
                .enter()
                .append("circle")
                .attr("class", d => `node type-${d.type}`)
                .attr("r", d => d.size || 5)
                .call(drag(simulation));

            // Add labels
            const labels = g.selectAll(".label")
                .data(data.nodes)
                .enter()
                .append("text")
                .attr("class", "node-label")
                .text(d => d.name.substring(0, 15));

            // Tooltip
            const tooltip = document.createElement("div");
            tooltip.className = "tooltip";
            document.body.appendChild(tooltip);

            node.on("mouseover", (event, d) => {
                tooltip.style.display = "block";
                tooltip.innerHTML = `
                    <strong>${d.name}</strong><br/>
                    Type: ${d.type}<br/>
                    ID: ${d.id.substring(0, 20)}...
                `;
            }).on("mousemove", (event) => {
                tooltip.style.left = (event.pageX + 10) + "px";
                tooltip.style.top = (event.pageY + 10) + "px";
            }).on("mouseout", () => {
                tooltip.style.display = "none";
            });

            // Update positions on tick
            simulation.on("tick", () => {
                link
                    .attr("x1", d => d.source.x)
                    .attr("y1", d => d.source.y)
                    .attr("x2", d => d.target.x)
                    .attr("y2", d => d.target.y);

                node
                    .attr("cx", d => d.x = Math.max(5, Math.min(width - 5, d.x)))
                    .attr("cy", d => d.y = Math.max(5, Math.min(height - 5, d.y)));

                labels
                    .attr("x", d => d.x)
                    .attr("y", d => d.y);
            });

            function drag(simulation) {
                function dragStarted(event, d) {
                    if (!event.active) simulation.alphaTarget(0.3).restart();
                    d.fx = d.x;
                    d.fy = d.y;
                }

                function dragged(event, d) {
                    d.fx = event.x;
                    d.fy = event.y;
                }

                function dragEnded(event, d) {
                    if (!event.active) simulation.alphaTarget(0);
                    d.fx = null;
                    d.fy = null;
                }

                return d3.drag()
                    .on("start", dragStarted)
                    .on("drag", dragged)
                    .on("end", dragEnded);
            }
        }
    </script>
</body>
</html>
